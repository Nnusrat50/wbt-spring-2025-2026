<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="form.css">

</head>

<body>
    <h1>Donor Information</h1>
    <form method="post">

        <table>

            <tr>
                <td><label for="first name">First Name <span class=required>*</span></label></td>
                <td><input type="text" id="first_name" name="first name" required></td>
            </tr>

            <tr>
                <td><label for="last name">Last Name <span class=required>*</span></label></td>
                <td><input type="text" id="last_name" name="last name" required></td>
            </tr>

            <tr>
                <td><label for="company">Company:</label></td>
                <td><input type="text" id="company" name="company"></td>
            </tr>

            <tr>
                <td><label for="address 1">Address 1 <span class=required>*</span></label></td>
                <td><input type="text" id="address1" name="address 1" required></td>
            </tr>

            <tr>
                <td><label for="address 2">Address 2:</label></td>
                <td><input type="text" id="address2" name="address 2"></td>
            </tr>

            <tr>
                <td><label for="city">City <span class=required>*</span></label></td>
                <td><input type="text" id="city" name="city" required></td>
            </tr>

            <tr>
                <td><label for="state">State <span class=required>*</span></label></td>
                <td><select id="state" name="state">
                        <option value="" disabled selected>Select a State</option>
                        <option>Dhaka</option>
                        <option>Dinajpur</option>
                        <option>Rangpur</option>
                        <option>Rajshahi</option>

                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="zip code">Zip Code <span class=required>*</span></label></td>
                <td><input type="text" id="zip_code" name="zip code" required></td>
            </tr>

            <tr>
                <td><label for="country">Country <span class=required>*</span></label></td>
                <td><select id="country" name="country">
                        <option value="" disabled selected>Select a country</option>
                        <option>Bangladesh</option>
                        <option>India</option>
                        <option>Nepal</option>
                        <option>USA</option>

                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="phone">Phone</label></td>
                <td><input type="text" id="phone" name="phone"></td>
            </tr>

            <tr>
                <td><label for="fax">Fax</label></td>
                <td><input type="text" id="fax" name="fax"></td>
            </tr>

            <tr>
                <td><label for="email">Email <span class=required>*</span></label></td>
                <td><input type="text" id="email" name="email" required></td>
            </tr>

            <tr>
                <td><label>Donetion Amount <span class=required>*</span></label> <br>
                    <small class="note">
                        (Check a button or type in your amount)
                    </small>
                </td>
                <td>
                    <input type="radio" name="donetion amount" value="none"> None
                    <input type="radio" name="donetion amount" value="$50"> $50
                    <input type="radio" name="donetion amount" value="$75"> $75
                    <input type="radio" name="donetion amount" value="$100"> $100
                    <input type="radio" name="donetion amount" value="$250"> $250
                    <input type="radio" name="donetion amount" value="other"> Other
                </td>
            </tr>

            <tr>
                <td><label for="other amount"> Other amount $ </label></td>
                <td><input type="text" id="other amount" name="other amount"></td>
            </tr>

            <tr>
                <td><label>Recurring Donation </label> <br>
                    <small class="note">
                        (Check if yes)
                    </small>
                </td>
                <td><input type="checkbox" value="i am interested in giving on a regular basis">I am interested in
                    giving on a regular basis
                </td>
            </tr>

            <tr>
                <td><label for="monthly card">Monthly Credit Card $</label></td>
                <td><input type="text" id="monthly card" name="monthly card">
                    <label for="for">For</label>
                    <input type="text" id="for" name="for">
                    <label for="months">Months</label>
                </td>

            </tr>


        </table>
        </br>
        <input type="submit" value="Submit">
        <input type="reset">




    </form>


</body>
