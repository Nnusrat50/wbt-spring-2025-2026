<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Discount Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>

<body>

    <div class="page">

        <div class="card">

            <h1>Discount Calculator</h1>
            <p class="subtitle">
                Enter the original price and discount percentage to calculate the final price instantly.
            </p>

            <div class="price-box">
                <span class="label">Tax Rate</span>
                <span class="value" id="tax-rate"></span>
            </div>

            <div class="form-group">
                <label>Original Price</label>
                <input type="number" id="original-price" placeholder="Enter price">
                <small class="error-message" id="price-error"></small>
            </div>

            <div class="form-group">
                <label>Discount Percentage</label>
                <input type="number" id="discount" placeholder="Enter discount %">
                <small class="error-message" id="discount-error"></small>
            </div>

            <div class="form-group">
                <label>Final Price</label>
                <input type="text" id="final-price" readonly>
            </div>

        </div>

    </div>

    <script src="calculator.js"></script>

</body>

</html>
