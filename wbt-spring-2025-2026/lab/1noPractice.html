<body>
    <div class="container">

        <div class="section">
            <h2>Name Form </h2>

            <form id="nameForm" novalidate>
                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="Enter First Name" />
                    <div class="error" id="firstNameError"></div>
                </div>

                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Enter Last Name" />
                    <div class="error" id="lastNameError"></div>
                </div>

                <button type="submit">Submit</button>
                <div id="formSuccess" class="success"></div>
            </form>
        </div>
    </div>

    <script>
        const nameForm = document.getElementById('nameForm');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const firstNameError = document.getElementById('firstNameError');
        const lastNameError = document.getElementById('lastNameError');
        const formSuccess = document.getElementById('formSuccess');

        function showError(inputElement, errorElement, message) {
            errorElement.textContent = message;

            inputElement.classList.remove('valid');
            inputElement.classList.add('invalid');
        }

        function showValid(inputElement, errorElement) {

            errorElement.textContent = '';

            inputElement.classList.remove('invalid');
            inputElement.classList.add('valid');
        }


        function resetValidation() {
            formSuccess.textContent = '';

            firstNameError.textContent = '';
            lastNameError.textContent = '';

            firstNameInput.classList.remove('valid', 'invalid');
            lastNameInput.classList.remove('valid', 'invalid');
        }

        nameForm.addEventListener('submit', function (event) {

            event.preventDefault();


            resetValidation();


            const firstNameValue = firstNameInput.value.trim();
            const lastNameValue = lastNameInput.value.trim();

            let isFormValid = true;

            if (firstNameValue === '') {
                showError(firstNameInput, firstNameError, 'First name required');
                isFormValid = false;
            } else if (firstNameValue.length < 2) {
                showError(firstNameInput, firstNameError, 'Each field must have at least 2 characters');
                isFormValid = false;
            } else {
                showValid(firstNameInput, firstNameError);
            }

            if (lastNameValue === '') {
                showError(lastNameInput, lastNameError, 'Last name required');
                isFormValid = false;
            } else if (lastNameValue.length < 2) {
                showError(lastNameInput, lastNameError, 'Each field must have at least 2 characters');
                isFormValid = false;
            } else {
                showValid(lastNameInput, lastNameError);
            }

            if (isFormValid) {
                formSuccess.textContent = 'Submitted Successfully!';
            } else {
                alert('Submission Failed!!');
            }
        });
    </script>
</body>
