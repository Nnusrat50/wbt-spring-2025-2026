<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draw a 300px × 200px container box</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #FFFFFF;
            background-image:
                linear-gradient(to right, #9E9F9E 1px, transparent 1px),
                linear-gradient(to bottom, #9E9F9E 1px, transparent 1px);
            background-size: 10px 10px;
            margin: 0;
            padding: 20px;
            color: #1F1F1F;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        .section {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .section h2 {
            margin-top: 0;
            text-align: center;
        }

        .box-container {
            width: 300px;
            height: 200px;
            border: 2px solid #1F1F1F;
            position: relative;
            margin: 20px auto;

            background-image:
                linear-gradient(to right, #9E9F9E 1px, transparent 1px),
                linear-gradient(to bottom, #9E9F9E 1px, transparent 1px);
            background-size: 10px 10px;
        }

        .container-label {
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            margin-top: 20px;
        }

        .dimensions-container {
            text-align: center;
            font-size: 12px;
            color: #1F1F1F;
            margin-top: 4px;
        }

        .box-inner {
            width: 80px;
            height: 60px;
            border: 2px solid #1F1F1F;
            background: #FAFAFA;
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
        }

        .dimensions-inner {
            text-align: center;
            font-size: 12px;
            color: #1F1F1F;
            margin-top: 6px;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="section">
            <h2>Draw a 300px × 200px Container Box</h2>

            <div class="box-container">
                <div class="container-label">Container Area</div>
                <div class="dimensions-container">300px × 200px (30 × 20 squares)</div>
                <div class="box-inner">
                    Bottom<br>Right
                </div>
            </div>

            <div class="dimensions-inner">
                Inner Box — 80px × 60px (8 × 6 grid squares) and 10px (1 square) from bottom & right
            </div>
        </div>
    </div>
</body>

</html>
