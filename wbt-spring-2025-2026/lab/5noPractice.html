<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate Random Background Color</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #FFFFFF;
            margin: 0;
            padding: 20px;
            transition: background-color 0.4s ease;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            color: #1F1F1F;
        }

        .section {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .section h2 {
            margin-top: 0;
            text-align: center;
        }

        button {
            display: block;
            margin: 8px auto;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #357735;
            color: #FFFFFF;
            cursor: pointer;
            font-size: 14px;
        }

        .color-display {
            text-align: center;
            margin-top: 14px;
            font-size: 14px;
            color: #1F1F1F;
        }

        .color-box {
            width: 80px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #FFFFFF;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="section">
            <h2>Generate Random Background Color</h2>
            <button id="changeBgBtn">Change Background</button>
            <div class="color-display" id="colorDisplay">
                Click the button to generate a random background color!
            </div>
        </div>
    </div>

    <script>
        const changeBgBtn = document.getElementById('changeBgBtn');
        const colorDisplay = document.getElementById('colorDisplay');

        function getRandomColor() {
            const randomNum = Math.floor(Math.random() * 16777215);
            const hexColor = '#' + randomNum.toString(16).padStart(6, '0');
            return hexColor;
        }

        changeBgBtn.addEventListener('click', function () {
            const randomColor = getRandomColor();

            document.body.style.backgroundColor = randomColor;
            colorDisplay.innerHTML =
                'Current background color: <span class="color-box" style="background-color: ' + randomColor + ';"></span>';
        });
    </script>
</body>

</html>
